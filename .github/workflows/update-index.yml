name: Update vuln index

on:
  push:
    branches: [main]
    paths:
      - 'vulns/**'
      - 'scripts/generate_index.py'
      - '.github/workflows/update-index.yml'
  workflow_dispatch:

jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Regenerar índice
        run: python scripts/generate_index.py

      - name: Regenerar índice y normalizar nombres
        run: python scripts/generate_index.py --normalize

      - name: Commit si hay cambios
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: actualizar índice y normalizar nombres [skip ci]"
            git push
          else
            echo "Sin cambios."
          fi